<script>
// ============================================================
// PUPUPU PRO v9 — Fuente de datos: Google Sheets
// ============================================================
// INSTRUCCIONES DE CONFIGURACIÓN:
// 1. Corre el notebook PUPUPU_Colector.ipynb en Google Colab
// 2. Copia el SHEET_ID que aparece en la Celda 4
// 3. Pégalo abajo donde dice TU_SHEET_ID_AQUI
// ============================================================
const SHEET_ID = "1l4jjW4zdEVTOis2OTGWSiDfWpBzPWHuqnAz-Vfxcpmg";   // ← PEGA AQUÍ TU SHEET ID
const SHEET_RANGE = "A1:O10500";        // Columnas A-O, hasta ~10.000 filas (7 días)

// Estado de configuración
const CONFIG_OK = SHEET_ID !== "TU_SHEET_ID_AQUI";

// Caché local con timestamp para no recargar demasiado
let _cacheVelas = [];
let _cacheTs = 0;
const CACHE_TTL_MS = 55000; // refresca si han pasado más de 55s

async function cargarDesdeSheets() {
  if (!CONFIG_OK) { throw new Error("SHEET_ID no configurado"); }
  if (_cacheVelas.length && (Date.now() - _cacheTs) < CACHE_TTL_MS) {
    return _cacheVelas;
  }
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Hoja%201`;
  const r = await fetch(url);
  if (!r.ok) throw new Error("HTTP " + r.status);
  const csv = await r.text();
  const lineas = csv.trim().split("\n");
  if (lineas.length < 2) return [];
  const velas = [];
  for (let i = 1; i < lineas.length; i++) {
    const cols = lineas[i].split(",").map(c => c.replace(/^"|"$/g, "").trim());
    if (cols.length < 6 || !cols[0]) continue;
    velas.push({
      timestamp:       cols[0],
      open:            parseFloat(cols[1]) || 0,
      high:            parseFloat(cols[2]) || 0,
      low:             parseFloat(cols[3]) || 0,
      close:           parseFloat(cols[4]) || 0,
      volume:          parseFloat(cols[5]) || 0,
      ema15:           cols[6]  ? parseFloat(cols[6])  : undefined,
      ema_slope:       cols[7]  ? parseFloat(cols[7])  : undefined,
      vwap:            cols[8]  ? parseFloat(cols[8])  : undefined,
      vwap_dist_p:     cols[9]  ? parseFloat(cols[9])  : undefined,
      vwap_dir:        cols[10] || undefined,
      rsi_14:          cols[11] ? parseFloat(cols[11]) : undefined,
      vol_relativo:    cols[12] ? parseFloat(cols[12]) : undefined,
      cuerpo_vela_p:   cols[13] ? parseFloat(cols[13]) : undefined,
      pivot_confirmed: cols[14] ? parseInt(cols[14])   : 0,
    });
  }
  _cacheVelas = velas;
  _cacheTs = Date.now();
  return velas;
}

// Compatibilidad: save no hace nada (los datos viven en Sheets)
function save(d) { /* datos en Google Sheets, no en localStorage */ }
function load()  { return { velas: [] }; }

async function fetchV(sym,hrs){const now=Date.now(),st=now-hrs*36e5;let all=[],cs=st;while(cs<now){const r=await fetch(`https://api.binance.com/api/v3/klines?symbol=${sym}&interval=1m&startTime=${cs}&endTime=${now}&limit=1000`);if(!r.ok)throw new Error("HTTP "+r.status);const d=await r.json();if(!d.length)break;for(const k of d)all.push({timestamp:new Date(k[0]).toISOString().slice(0,19).replace("T"," "),open:+k[1],high:+k[2],low:+k[3],close:+k[4],volume:+k[5]});cs=d[d.length-1][0]+6e4;await new Promise(r=>setTimeout(r,300))}return all}

// INDICADORES
function cEMA(v,p=15){if(v.length<p)return v;const k=2/(p+1);let s=0;for(let i=0;i<p;i++)s+=v[i].close;s/=p;v[p-1].ema15=s;for(let i=p;i<v.length;i++)v[i].ema15=v[i].close*k+v[i-1].ema15*(1-k);for(let i=0;i<v.length;i++){if(!i||!v[i].ema15||!v[i-1].ema15)v[i].ema_slope=null;else v[i].ema_slope=v[i].ema15-v[i-1].ema15}return v}
function cVW(v){let sp=0,sv=0,cd=null;for(const c of v){const d=c.timestamp.slice(0,10);if(d!==cd){sp=0;sv=0;cd=d}const pt=(c.high+c.low+c.close)/3;sp+=pt*c.volume;sv+=c.volume;c.vwap=sv>0?sp/sv:c.close;c.vwap_dist_p=sv>0?((c.close-c.vwap)/c.vwap)*100:0}return v}
function cRSI(v,p=14){let ag=0,al=0;for(let i=0;i<v.length;i++){if(i<p){v[i].rsi_14=null;continue}if(i===p){let g=0,l=0;for(let j=1;j<=p;j++){const c=v[j].close-v[j-1].close;if(c>0)g+=c;else l+=Math.abs(c)}ag=g/p;al=l/p}else{const c=v[i].close-v[i-1].close;ag=(ag*(p-1)+(c>0?c:0))/p;al=(al*(p-1)+(c<0?Math.abs(c):0))/p}v[i].rsi_14=al===0?100:100-100/(1+ag/al)}return v}
function cVR(v,p=20){for(let i=0;i<v.length;i++){if(i<p){v[i].vol_relativo=null;continue}let s=0;for(let j=i-p;j<i;j++)s+=v[j].volume;const a=s/p;v[i].vol_relativo=a>0?v[i].volume/a:0}return v}
function cCu(v){for(const c of v)c.cuerpo_vela_p=c.open?Math.abs(c.close-c.open)/c.open*100:0;return v}
// FIX #1: Pivotes - guardar el indice de confirmación (i+2)
function cPv(v,e=2){
  for(const c of v){c.pivot_confirmed=0;c.pivot_confirm_idx=null}
  for(let i=e;i<v.length-e;i++){
    let ih=true,il=true;
    for(let j=1;j<=e;j++){
      if(i-j>=0&&v[i-j].high>=v[i].high)ih=false;
      if(i+j<v.length&&v[i+j].high>=v[i].high)ih=false;
      if(i-j>=0&&v[i-j].low<=v[i].low)il=false;
      if(i+j<v.length&&v[i+j].low<=v[i].low)il=false;
    }
    if(ih){v[i].pivot_confirmed=1;v[i].pivot_confirm_idx=i+e}
    else if(il){v[i].pivot_confirmed=-1;v[i].pivot_confirm_idx=i+e}
  }
  // Crear mapa inverso: para cada vela de confirmación, qué pivote confirma
  for(const c of v)c.pivot_just_confirmed=0;
  for(let i=e;i<v.length-e;i++){
    if(v[i].pivot_confirmed!==0&&v[i].pivot_confirm_idx<v.length){
      // En la vela de confirmación, marcar que se acaba de confirmar un pivote
      const ci=v[i].pivot_confirm_idx;
      if(v[ci].pivot_just_confirmed===0)v[ci].pivot_just_confirmed=v[i].pivot_confirmed;
    }
  }
  return v;
}
function cAll(v){return cPv(cCu(cVR(cRSI(cVW(cEMA(v,15)),14),20)),2)}

// DETECTOR v3: TTL=2
function detect(velas,cd=5){
  const TTL=2,sen=[];let ut=null,php=null,plp=null;
  for(let i=1;i<velas.length;i++){
    const v=velas[i],vp=velas[i-1];if(!v.ema15||!vp.ema15)continue;
    if(v.pivot_confirmed===1)php=v.high;else if(v.pivot_confirmed===-1)plp=v.low;
    const ca=vp.close<vp.ema15&&v.close>v.ema15,cb=vp.close>vp.ema15&&v.close<v.ema15;
    if(!ca&&!cb)continue;if(ca&&plp===null)continue;if(cb&&php===null)continue;
    const ta=new Date(v.timestamp+"Z");if(ut&&(ta-ut)/1000<cd*60)continue;
    let d,slP,tpP,pp;
    if(ca){d="LONG";slP=plp*.999;tpP=v.ema15+Math.abs(v.ema15-slP);pp=plp}
    else{d="SHORT";slP=php*1.001;tpP=v.ema15-Math.abs(slP-v.ema15);pp=php}
    let ri=null;
    for(let j=i+1;j<=Math.min(i+TTL,velas.length-1);j++){
      const vj=velas[j];if(!vj.ema15)continue;
      if(d==="LONG"&&vj.low<=slP)break;if(d==="SHORT"&&vj.high>=slP)break;
      if(d==="LONG"&&vj.low<=vj.ema15){ri=j;break}
      if(d==="SHORT"&&vj.high>=vj.ema15){ri=j;break}
    }
    if(ri===null)continue;
    const vr=velas[ri];const pi=vr.ema15;
    let sl,r,tp,cv;
    if(d==="LONG"){sl=plp*.999;r=Math.abs(pi-sl);tp=pi+r;cv=vr.vwap?vr.close<vr.vwap:null}
    else{sl=php*1.001;r=Math.abs(sl-pi);tp=pi-r;cv=vr.vwap?vr.close>vr.vwap:null}
    if(d==="LONG"&&vr.high>=tp)continue;if(d==="SHORT"&&vr.low<=tp)continue;
    sen.push({ts:vr.timestamp,tsCruce:v.timestamp,dir:d,precioIn:pi,sl,tp11:tp,riesgo:r,riesgoP:pi>0?(r/pi)*100:0,vwap:vr.vwap,cumpleVwap:cv,esIntencion:(v.cuerpo_vela_p||0)<.05,distPivEmaP:Math.abs(pp-pi)/pi*100,idx:ri,idxCruce:i,retesteoVelas:ri-i});
    ut=ta;i=ri;
  }
  return sen;
}

// SIMULADOR v8: paramétrico con beRatio
// beRatio: 0 = sin BE, 1 = BE en 1:1, 2 = BE en 2:1
function simOp(sen,velas,beRatio){
  const{precioIn:pi,sl:sli,tp11:tp,dir:d,riesgo:r,idx}=sen;
  const beR=beRatio||1; // default 1:1
  const noBE=beRatio===0;
  let mfe=0,mae=0;
  function cR(p){return r===0?0:d==="LONG"?(p-pi)/r:(pi-p)/r}
  function pFromR(ratio){return d==="LONG"?pi+ratio*r:pi-ratio*r}
  function em12(ix){if(ix<36)return null;const k=2/13;let e=0;for(let j=ix-35;j<=ix-24;j++)e+=velas[j].close;e/=12;for(let j=ix-23;j<=ix;j++)e=velas[j].close*k+e*(1-k);return e}
  // TP levels
  const tp05=d==="LONG"?pi+r*0.5:pi-r*0.5;
  const tpBE=d==="LONG"?pi+r*beR:pi-r*beR; // precio donde se activa BE

  function mkR(ratio,ts,m,vi){
    let ps;
    if(ratio===-1)ps=sli;
    else if(m==="BE"||ratio===0)ps=pi;
    else ps=pFromR(ratio);
    return{ratio:Math.round(ratio*100)/100,ts,m,vi,ps:Math.round(ps*100)/100};
  }

  // Check if price hits a ratio level
  function hitsR(h,l,ratio){const p=pFromR(ratio);return d==="LONG"?h>=p:l<=p}

  const E={
    TP_FIJO:{a:true,r:null},
    BE_Y_CORRER:{a:true,r:null,be:false},
    RATIO_LINEAL:{a:true,r:null,be:false,rs:0,sa:sli},
    RATIO_NO_LINEAL:{a:true,r:null,be:false,rs:0,sa:sli},
    CRUCE_EMA12:{a:true,r:null,be:false},
    PIVOTE_CONFIRMADO:{a:true,r:null,be:false},
    MIXTA:{a:true,r:null,be:false,phase:"ema12"}, // phase: "ema12" then "trail"
  };
  let tp050={a:true,r:null};

  for(let i=idx+1;i<velas.length;i++){
    const v=velas[i],{high:h,low:l,close:c}=v;
    const rFH=r>0?(d==="LONG"?(h-pi)/r:(pi-l)/r):0;
    const tsl=d==="LONG"?l<=sli:h>=sli;
    const ttp=hitsR(h,l,1); // hits 1:1
    const ttpBE=hitsR(h,l,beR); // hits BE ratio
    const ttp05=d==="LONG"?h>=tp05:l<=tp05;
    mfe=Math.max(mfe,rFH);mae=Math.min(mae,r>0?(d==="LONG"?(l-pi)/r:(pi-h)/r):0);

    // TP_050
    if(tp050.a){if(tsl&&ttp05){tp050={a:false,r:mkR(-1,v.timestamp,"SL",i)}}else if(tsl){tp050={a:false,r:mkR(-1,v.timestamp,"SL",i)}}else if(ttp05){tp050={a:false,r:mkR(.5,v.timestamp,"TP",i)}}}

    // TP_FIJO: siempre cierra en 1:1, no afectado por beRatio
    const e1=E.TP_FIJO;if(e1.a){if(tsl&&ttp){e1.r=mkR(-1,v.timestamp,"SL",i);e1.a=false}else if(tsl){e1.r=mkR(-1,v.timestamp,"SL",i);e1.a=false}else if(ttp){e1.r=mkR(1,v.timestamp,"TP",i);e1.a=false}}

    // BE_Y_CORRER: afectado por beRatio
    const e2=E.BE_Y_CORRER;
    if(e2.a){
      if(noBE){
        // Sin BE: solo cierra si toca SL original
        if(tsl){e2.r=mkR(-1,v.timestamp,"SL",i);e2.a=false}
      } else {
        if(!e2.be){
          if(tsl){e2.r=mkR(-1,v.timestamp,"SL",i);e2.a=false}
          else if(ttpBE)e2.be=true;
        } else {
          if((d==="LONG"&&l<=pi)||(d==="SHORT"&&h>=pi)){e2.r=mkR(0,v.timestamp,"BE",i);e2.a=false}
        }
      }
    }

    // TRAIL genérico: afectado por beRatio
    function trail(e,mf){
      if(!e.a)return;
      if(!e.be){
        if(tsl){e.r=mkR(-1,v.timestamp,"SL",i);e.a=false;return}
        if(ttpBE){e.be=true;e.sa=pi;e.rs=0}else return;
      }
      if(e.a&&e.be){
        const mr=Math.floor(rFH);
        for(let rr=Math.floor(e.rs)+1;rr<=mr;rr++){
          const mg=mf(rr),ns=Math.max(0,rr-mg);
          if(ns>e.rs){e.rs=ns;e.sa=d==="LONG"?pi+ns*r:pi-ns*r}
        }
        const mgC=mf(mr),nsC=Math.max(0,mr-mgC);
        if(nsC>e.rs){e.rs=nsC;e.sa=d==="LONG"?pi+nsC*r:pi-nsC*r}
        if((d==="LONG"&&l<=e.sa)||(d==="SHORT"&&h>=e.sa)){
          e.r=mkR(e.rs,v.timestamp,"R"+Math.round(e.rs),i);e.a=false;
        }
      }
    }
    trail(E.RATIO_LINEAL,()=>1);
    trail(E.RATIO_NO_LINEAL,x=>x<=5?1:x<=10?2:x<=15?3:4);

    // CRUCE_EMA12: afectado por beRatio
    const e5=E.CRUCE_EMA12;
    if(e5.a){
      if(noBE){
        // Sin BE: SL original, cierre solo por cruce EMA12
        if(tsl){e5.r=mkR(-1,v.timestamp,"SL",i);e5.a=false}
        else{const em=em12(i);if(em&&ttp&&((d==="LONG"&&c<em)||(d==="SHORT"&&c>em))){e5.r=mkR(cR(c),v.timestamp,"EMA12",i);e5.a=false}}
      } else {
        if(!e5.be){
          if(tsl){e5.r=mkR(-1,v.timestamp,"SL",i);e5.a=false}
          else if(ttpBE)e5.be=true;
        } else {
          // Primero check BE
          if((d==="LONG"&&l<=pi)||(d==="SHORT"&&h>=pi)){e5.r=mkR(0,v.timestamp,"BE",i);e5.a=false}
          else{const em=em12(i);if(em&&((d==="LONG"&&c<em)||(d==="SHORT"&&c>em))){e5.r=mkR(cR(c),v.timestamp,"EMA12",i);e5.a=false}}
        }
      }
    }

    // FIX #1: PIVOTE_CONFIRMADO - cierra al close de vela de CONFIRMACIÓN (i+2), no del pivote
    const e6=E.PIVOTE_CONFIRMADO;
    if(e6.a){
      if(noBE){
        if(tsl){e6.r=mkR(-1,v.timestamp,"SL",i);e6.a=false}
        else{
          // Buscar pivote contrario confirmado EN ESTA VELA (pivot_just_confirmed)
          if((d==="LONG"&&v.pivot_just_confirmed===1)||(d==="SHORT"&&v.pivot_just_confirmed===-1)){
            e6.r=mkR(cR(c),v.timestamp,"PIV",i);e6.a=false;
          }
        }
      } else {
        if(!e6.be){
          if(tsl){e6.r=mkR(-1,v.timestamp,"SL",i);e6.a=false}
          else if(ttpBE)e6.be=true;
        } else {
          if((d==="LONG"&&l<=pi)||(d==="SHORT"&&h>=pi)){e6.r=mkR(0,v.timestamp,"BE",i);e6.a=false}
          else if((d==="LONG"&&v.pivot_just_confirmed===1)||(d==="SHORT"&&v.pivot_just_confirmed===-1)){
            e6.r=mkR(cR(c),v.timestamp,"PIV",i);e6.a=false;
          }
        }
      }
    }

    // MIXTA: EMA12 protection until 2R, then trail NL
    const eM=E.MIXTA;
    if(eM.a){
      if(!eM.be){
        if(tsl){eM.r=mkR(-1,v.timestamp,"SL",i);eM.a=false}
        else if(ttpBE){eM.be=true;eM.phase="ema12";eM.rs=0;eM.sa=pi}
      }
      if(eM.a&&eM.be){
        // Check BE first
        if(!noBE&&(d==="LONG"&&l<=pi)||(d==="SHORT"&&h>=pi)){
          // Only if we haven't reached 2R yet (in ema12 phase)
          if(eM.phase==="ema12"){eM.r=mkR(0,v.timestamp,"BE",i);eM.a=false}
        }
        if(eM.a&&eM.phase==="ema12"){
          // In EMA12 phase: check if we reached 2R to switch to trail
          if(rFH>=2){
            eM.phase="trail";eM.rs=0;eM.sa=pi; // trail starts from entry
          } else {
            // Check EMA12 cross (only closes if ratio would be negative = going wrong)
            const em=em12(i);
            if(em&&((d==="LONG"&&c<em)||(d==="SHORT"&&c>em))){
              eM.r=mkR(cR(c),v.timestamp,"EMA12",i);eM.a=false;
            }
          }
        }
        if(eM.a&&eM.phase==="trail"){
          // Trail NL from current position
          const mr=Math.floor(rFH);const mf=x=>x<=5?1:x<=10?2:x<=15?3:4;
          for(let rr=Math.floor(eM.rs)+1;rr<=mr;rr++){
            const mg=mf(rr),ns=Math.max(0,rr-mg);
            if(ns>eM.rs){eM.rs=ns;eM.sa=d==="LONG"?pi+ns*r:pi-ns*r}
          }
          const mgC=mf(mr),nsC=Math.max(0,mr-mgC);
          if(nsC>eM.rs){eM.rs=nsC;eM.sa=d==="LONG"?pi+nsC*r:pi-nsC*r}
          if((d==="LONG"&&l<=eM.sa)||(d==="SHORT"&&h>=eM.sa)){
            eM.r=mkR(eM.rs,v.timestamp,"MX"+Math.round(eM.rs),i);eM.a=false;
          }
        }
      }
    }

    if(Object.values(E).every(e=>!e.a)&&!tp050.a)break;
  }
  const lv=velas[velas.length-1];
  for(const e of Object.values(E))if(e.a)e.r=mkR(cR(lv.close),lv.timestamp,"FIN",velas.length-1);
  if(tp050.a)tp050.r=mkR(cR(lv.close),lv.timestamp,"FIN",velas.length-1);
  return{mfe:Math.round(mfe*100)/100,mae:Math.round(mae*100)/100,tp050:tp050.r,estrategias:Object.fromEntries(Object.entries(E).map(([k,v])=>[k,v.r]))};
}

// COMISIONES: maker 0.02% * 2 (ida y vuelta) sobre tamaño posición
// tamaño posición = riesgo$ / (riesgo% del precio)
// comision$ = posición * 0.0004
// comisionR = comision$ / riesgo$ = 0.0004 / (riesgoP/100) = 0.04 / riesgoP
function comisionR(riesgoP){return riesgoP>0?0.04/riesgoP:0}

// SIMULAR CUENTA — maxSim: max ops simultáneas (1-4, 0=infinito)
function simCuenta(rawOps,cap,rPct,est,tp05mode,useFees,maxSim){
  let c=cap;const curva=[{ts:"",c}],rows=[];
  const ms=maxSim||0; // 0 = sin limite
  const passIdx=[];
  // Filtro: ops activas (lista de ts_salida)
  let active=[];
  for(let i=0;i<rawOps.length;i++){
    const op=rawOps[i],s=op.estrategias?.[est];if(!s)continue;
    // Limpiar activas que ya cerraron antes de esta entrada
    active=active.filter(ts=>ts>op.ts);
    if(ms>0&&active.length>=ms)continue;
    active.push(s.ts);
    passIdx.push(i);
  }
  for(const i of passIdx){
    const op=rawOps[i];
    let s;
    if(tp05mode&&op.tp050)s=op.tp050;
    else s=op.estrategias?.[est];
    if(!s)continue;
    const a=c*(rPct/100);
    let rat=s.ratio;
    if(useFees)rat-=comisionR(op.riesgoP);
    const pnl=Math.round(a*rat*100)/100;
    c=Math.round((c+pnl)*100)/100;
    curva.push({ts:s.ts,c});
    rows.push({...op,pnl,cPost:c,rEst:s.ratio,mEst:s.m,opIdx:i,feeR:useFees?comisionR(op.riesgoP):0});
  }
  return{curva,rows,cFinal:c,passIdx};
}

function drawCandles(canvasId,velas,annotations){
  const canvas=document.getElementById(canvasId);if(!canvas)return;
  const ctx=canvas.getContext("2d");
  const dpr=window.devicePixelRatio||1;
  const W=canvas.clientWidth,H=canvas.clientHeight;
  canvas.width=W*dpr;canvas.height=H*dpr;
  ctx.scale(dpr,dpr);
  ctx.fillStyle="#111827";ctx.fillRect(0,0,W,H);
  if(!velas.length)return;
  const pad={t:10,b:30,l:50,r:10};
  const cW=Math.max(1,Math.min(6,(W-pad.l-pad.r)/velas.length-1));
  const gW=Math.max(1,cW+1);
  let mn=Infinity,mx=-Infinity;
  for(const v of velas){mn=Math.min(mn,v.low);mx=Math.max(mx,v.high)}
  if(annotations){for(const a of annotations.hLines||[])if(a.y>=mn*.999&&a.y<=mx*1.001){mn=Math.min(mn,a.y);mx=Math.max(mx,a.y)}}
  const rng=mx-mn||1;mn-=rng*.02;mx+=rng*.02;const rng2=mx-mn;
  const yOf=p=>pad.t+(1-(p-mn)/rng2)*(H-pad.t-pad.b);
  const xOf=i=>pad.l+i*gW+gW/2;
  ctx.strokeStyle="#1e293b";ctx.lineWidth=.5;
  const nG=5;for(let i=0;i<=nG;i++){const y=pad.t+i*(H-pad.t-pad.b)/nG;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
    const pr=mn+(1-i/nG)*rng2;ctx.fillStyle="#64748b";ctx.font="9px monospace";ctx.textAlign="right";ctx.fillText(pr.toFixed(mn>1000?0:4),pad.l-4,y+3)}
  if(annotations?.zone){const z=annotations.zone;const x1=xOf(z.from)-gW/2,x2=xOf(z.to)+gW/2;
    ctx.fillStyle=z.color||"rgba(59,130,246,.06)";ctx.fillRect(x1,pad.t,x2-x1,H-pad.t-pad.b)}
  if(annotations?.hLines){for(const hl of annotations.hLines){const y=yOf(hl.y);if(y<pad.t||y>H-pad.b)continue;
    ctx.strokeStyle=hl.color;ctx.lineWidth=1;ctx.setLineDash(hl.dash||[4,3]);ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();ctx.setLineDash([]);
    if(hl.label){ctx.fillStyle=hl.color;ctx.font="9px monospace";ctx.textAlign="right";ctx.fillText(hl.label,W-pad.r,y-3)}}}
  ctx.strokeStyle="#f59e0b";ctx.lineWidth=1.5;ctx.setLineDash([4,2]);ctx.beginPath();
  let started=false;
  for(let i=0;i<velas.length;i++){if(!velas[i].ema15)continue;const x=xOf(i),y=yOf(velas[i].ema15);if(!started){ctx.moveTo(x,y);started=true}else ctx.lineTo(x,y)}
  ctx.stroke();ctx.setLineDash([]);
  for(let i=0;i<velas.length;i++){
    const v=velas[i],x=xOf(i),bull=v.close>=v.open;
    const col=bull?"#10b981":"#ef4444";
    ctx.strokeStyle=col;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x,yOf(v.high));ctx.lineTo(x,yOf(v.low));ctx.stroke();
    const yTop=yOf(Math.max(v.open,v.close)),yBot=yOf(Math.min(v.open,v.close));
    ctx.fillStyle=col;ctx.fillRect(x-cW/2,yTop,cW,Math.max(1,yBot-yTop));
  }
  if(annotations?.vLines){for(const vl of annotations.vLines){const x=xOf(vl.idx);
    ctx.strokeStyle=vl.color;ctx.lineWidth=2;ctx.setLineDash(vl.dash||[4,2]);ctx.beginPath();ctx.moveTo(x,pad.t);ctx.lineTo(x,H-pad.b);ctx.stroke();ctx.setLineDash([]);
    if(vl.label){const yOff=pad.t+12+(vl.labelOffset||0);ctx.fillStyle=vl.color;ctx.font="bold 9px monospace";ctx.textAlign="center";ctx.fillText(vl.label,x,yOff)}}}
  ctx.fillStyle="#64748b";ctx.font="9px monospace";ctx.textAlign="center";
  const step=Math.max(1,Math.floor(velas.length/8));
  for(let i=0;i<velas.length;i+=step){ctx.fillText(velas[i].timestamp.slice(11,16),xOf(i),H-pad.b+14)}
}

          <div><span style="color:var(--green)">Si:</span> ${vS.length} ops, MFE ${f(vS.length?vS.reduce((s,o)=>s+o.mfe,0)/vS.length:0,1)}</div>
          <div><span style="color:var(--red)">No:</span> ${vN.length} ops, MFE ${f(vN.length?vN.reduce((s,o)=>s+o.mfe,0)/vN.length:0,1)}</div></div>
        <div class="ib" style="flex:1;min-width:140px"><div style="font-size:10px;color:var(--muted);margin-bottom:4px">ESTRATEGIAS R medio (${ops.length} ops)</div>
          ${ESTS.map(e=>{
            const filtered=sim.passIdx.map(i=>rawOps[i]).filter(o=>o.estrategias?.[e]);
            const a=filtered.length?filtered.reduce((s,o)=>s+o.estrategias[e].ratio,0)/filtered.length:0;
            return`<div style="font-size:10px;color:${e===est?"var(--blue)":"var(--muted)"}">${e.replace(/_/g," ").slice(0,14)}: <b style="color:${a>=0?"var(--green)":"var(--red)"}">${f(a,2)}R</b></div>`}).join("")}
        </div>
      </div></div>`;
    // Gráfica TP variable
    h+=`<div class="cd" style="padding:14px">
      <div style="font-weight:700;margin-bottom:10px">Capital final segun ratio TP fijo${fees?" [FEES]":""}  (${rawOps.length} sen, ${cap}$, ${rsg}%)</div>
      <canvas id="tpCh" style="height:220px;max-height:220px"></canvas>
    </div>`;
    // Gráfica BE variable
    if(est!=="TP_FIJO"){
      h+=`<div class="cd" style="padding:14px">
        <div style="font-weight:700;margin-bottom:10px">Capital segun ratio de activacion BE — ${est.replace(/_/g," ")}${fees?" [FEES]":""}</div>
        <canvas id="beCh" style="height:220px;max-height:220px"></canvas>
        <div class="ib"><div style="font-size:10px;color:var(--muted)">Simula la misma estrategia variando el ratio al que se activa el BE (y arranque de trail). Requiere re-simular todas las ops para cada punto.</div></div>
      </div>`;
    }
  }

  if(tab==="grafico"&&nv>20){
    h+=`<div class="cd" style="padding:14px"><div style="font-weight:700;margin-bottom:10px">${par} 1m — Ultimas 150 velas</div><canvas id="pCh" style="height:300px"></canvas></div>`;
  }

  if(tab==="tabla"){
    h+=`<div class="cd"><div class="ct">${ops.length} ops — ${est.replace(/_/g," ")}${tp05?" (TP.5)":""}${fees?" [FEES]":""} <span style="font-weight:400;color:var(--muted);font-size:10px">Toca fila = Detalle</span></div>
      <div style="overflow-x:auto"><table><thead><tr>
        <th>#</th><th>Hora</th><th>Dir</th><th>Entrada</th><th>Salida</th><th>R Max</th><th>Ratio</th><th>PnL</th>${fees?"<th>Fee</th>":""}<th>V</th>
      </tr></thead><tbody>
      ${ops.map((o,i)=>{const rc=o.rEst<0?"rsl":o.rEst>0?"rtp":"";const dc=o.dir==="LONG"?"var(--green)":"var(--red)";
        const origIdx=o.opIdx!=null?o.opIdx:i;
        const sa=tp05&&o.tp050?o.tp050:(o.estrategias?.[est]);
        const pSal=sa?.ps||"—";
        return`<tr class="ck ${rc}" data-opi="${origIdx}">
          <td style="color:var(--muted)">${i+1}</td><td style="font-size:10px">${fD(o.ts)}</td>
          <td style="font-weight:700;color:${dc}">${o.dir}</td><td>${f(o.precioIn,pd)}</td>
          <td style="color:${o.rEst>0?"var(--green)":o.rEst<0?"var(--red)":"var(--muted)"}">${f(pSal,pd)}</td>
          <td style="color:var(--yellow)">1:${f(o.mfe,1)}</td>
          <td style="font-weight:700;color:${o.rEst>0?"var(--green)":o.rEst<0?"var(--red)":"var(--muted)"}">${o.rEst>0?"+":""}${f(o.rEst,1)}R (${o.mEst})</td>
          <td style="font-weight:700;color:${o.pnl>=0?"var(--green)":"var(--red)"}">${o.pnl>=0?"+":""}${f(o.pnl)}$</td>
          ${fees?`<td style="color:var(--red);font-size:10px">${f(o.feeR,2)}R</td>`:""}
          <td><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${o.cumpleVwap?"var(--green)":"var(--red)"}"></span></td>
        </tr>`}).join("")}</tbody></table></div></div>`;
  }

  // PESTAÑA DETALLE
  if(tab==="detalle"){
    if(selOp!==null&&rawOps[selOp]){
      const op=rawOps[selOp];
      const dc=op.dir==="LONG"?"var(--green)":"var(--red)";
      const ALL_E=ESTS;
      const prevIdx=selOp>0?selOp-1:null;
      const nextIdx=selOp<rawOps.length-1?selOp+1:null;
      h+=`<div class="od" id="opD">
        <div class="odh">
          <div style="display:flex;gap:8px;align-items:center">
            <button class="btn" id="prevOp" style="background:var(--border);color:var(--muted);padding:4px 10px;font-size:14px"${prevIdx===null?" disabled":""}>&lt;</button>
            <div style="font-weight:700;font-size:14px"><span style="color:${dc}">${op.dir}</span> @ ${f(op.precioIn,pd)} — ${op.ts.slice(5,16)}</div>
            <button class="btn" id="nextOp" style="background:var(--border);color:var(--muted);padding:4px 10px;font-size:14px"${nextIdx===null?" disabled":""}>&gt;</button>
          </div>
        </div>
        <div class="ods">
          <span>SL: <b style="color:var(--red)">${f(op.sl,pd)}</b></span>
          <span>TP1: <b style="color:var(--green)">${f(op.tp11,pd)}</b></span>
          <span>R Max: <b style="color:var(--yellow)">1:${f(op.mfe,1)}</b></span>
          <span>Ret: ${op.retesteoVelas||0}v</span>
          <span>VWAP: <span style="color:${op.cumpleVwap?"var(--green)":"var(--red)"}">${op.cumpleVwap?"Si":"No"}</span></span>
          ${fees?`<span>Fee: <b style="color:var(--red)">${f(comisionR(op.riesgoP),2)}R</b> (SL dist: ${f(op.riesgoP,3)}%)</span>`:""}
        </div>
        <canvas id="opCh" style="height:340px"></canvas>
        <div style="font-size:10px;color:var(--muted);margin:8px 0 4px">Puntos de salida por estrategia (BE:${beRatio===0?"Off":beRatio+":1"})</div>
        <div style="overflow-x:auto"><table><thead><tr>
          <th>Estrategia</th><th>Ratio</th><th>Motivo</th><th>P.Salida</th><th>Hora</th><th>Dur</th>
        </tr></thead><tbody>`;
      if(op.tp050){
        const s=op.tp050,rc=s.ratio>0?"var(--green)":s.ratio<0?"var(--red)":"var(--muted)";
        h+=`<tr><td style="color:#f59e0b">TP 0.5</td><td style="font-weight:700;color:${rc}">${s.ratio>0?"+":""}${f(s.ratio,1)}R</td><td>${s.m}</td><td>${f(s.ps,pd)}</td><td style="font-size:10px">${fD(s.ts)}</td><td style="color:var(--muted)">${(s.vi||op.idx)-op.idx}v</td></tr>`;
      }
      const EST_COLORS={"TP_FIJO":"#3b82f6","BE_Y_CORRER":"#8b5cf6","RATIO_LINEAL":"#f59e0b","RATIO_NO_LINEAL":"#ec4899","CRUCE_EMA12":"#06b6d4","PIVOTE_CONFIRMADO":"#84cc16","MIXTA":"#f97316"};
      for(const e of ALL_E){
        const s=op.estrategias?.[e];if(!s)continue;
        const rc=s.ratio>0?"var(--green)":s.ratio<0?"var(--red)":"var(--muted)";
        const col=EST_COLORS[e]||"#fff";
        h+=`<tr><td><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${col};margin-right:4px"></span>${e.replace(/_/g," ")}</td><td style="font-weight:700;color:${rc}">${s.ratio>0?"+":""}${f(s.ratio,1)}R</td><td>${s.m}</td><td>${f(s.ps,pd)}</td><td style="font-size:10px">${fD(s.ts)}</td><td style="color:var(--muted)">${(s.vi||op.idx)-op.idx}v</td></tr>`;
      }
      h+=`</tbody></table></div></div>`;
    } else {
      h+=`<div class="ldr"><div style="font-size:16px;margin-bottom:10px">Selecciona una operacion</div><div style="color:var(--muted)">Ve a Ops y toca una fila</div></div>`;
    }
  }

  if(!rawOps.length&&!loading)h+=`<div class="ldr"><div style="font-size:18px;margin-bottom:10px">Sin datos</div><div style="color:var(--muted)">Pulsa Actualizar</div></div>`;
  if(loading)h+=`<div class="ldr"><div class="spn"></div><div>Descargando ${par}...</div></div>`;
  h+=`</div>`;
  document.getElementById("app").innerHTML=h;

  // EVENTS
  document.getElementById("xUpd")?.addEventListener("click",exec);
  document.getElementById("xExp")?.addEventListener("click",exportar);
  document.getElementById("xSave")?.addEventListener("click",guardarEnSheets);
  document.getElementById("xPar")?.addEventListener("change",e=>{S.par=e.target.value});
  document.getElementById("xHrs")?.addEventListener("change",e=>{S.horas=+e.target.value});
  document.getElementById("xEst")?.addEventListener("change",e=>{S.est=e.target.value;S.selOp=null;render()});
  document.getElementById("xRsg")?.addEventListener("change",e=>{S.riesgo=+e.target.value;render()});
  document.getElementById("xCap")?.addEventListener("change",e=>{S.capital=+e.target.value;render()});
  document.getElementById("x05")?.addEventListener("change",e=>{S.tp05=e.target.checked;render()});
  document.getElementById("xFee")?.addEventListener("change",e=>{S.fees=e.target.checked;render()});
  document.getElementById("xBE")?.addEventListener("change",e=>{S.beRatio=+e.target.value;reSimOps();render()});
  document.getElementById("xSim")?.addEventListener("change",e=>{S.maxSim=+e.target.value;render()});
  document.querySelectorAll("[data-tab]").forEach(b=>b.addEventListener("click",e=>{S.tab=e.target.dataset.tab;render()}));
  document.getElementById("prevOp")?.addEventListener("click",()=>{if(S.selOp>0){S.selOp--;render()}});
  document.getElementById("nextOp")?.addEventListener("click",()=>{if(S.selOp<S.ops.length-1){S.selOp++;render()}});
  document.querySelectorAll("[data-opi]").forEach(r=>r.addEventListener("click",()=>{const i=+r.dataset.opi;S.selOp=i;S.tab="detalle";render();setTimeout(()=>document.getElementById("opD")?.scrollIntoView({behavior:"smooth",block:"start"}),100)}));

  // CHARTS
  setTimeout(()=>{
    if(tab==="cuenta"&&sim.curva.length>1){
      const ctx=document.getElementById("cCh")?.getContext("2d");if(ctx){if(ch1)ch1.destroy();
        ch1=new Chart(ctx,{type:"line",data:{labels:sim.curva.map(p=>fD(p.ts)),datasets:[{data:sim.curva.map(p=>p.c),borderColor:sim.cFinal>=cap?"#10b981":"#ef4444",backgroundColor:sim.cFinal>=cap?"rgba(16,185,129,.1)":"rgba(239,68,68,.1)",fill:true,tension:.3,pointRadius:0,borderWidth:2}]},
          options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:"#64748b",font:{size:9},maxTicksLimit:8},grid:{color:"#1e293b"}},y:{ticks:{color:"#64748b",font:{size:9}},grid:{color:"#1e293b"}}}}})}}

    // GRÁFICA TP VARIABLE
    if(tab==="cuenta"&&rawOps.length>5){
      const ctxTp=document.getElementById("tpCh")?.getContext("2d");
      if(ctxTp){
        const ratios=[];for(let r=3;r<=50;r++)ratios.push(r/10);
        const ms=S.maxSim||0;
        const caps=ratios.map(tpR=>{
          let c=cap;
          let active=[];
          for(const o of rawOps){
            const sf=o.estrategias?.TP_FIJO;if(!sf)continue;
            active=active.filter(ts=>ts>o.ts);
            if(ms>0&&active.length>=ms)continue;
            active.push(sf.ts);
            const a=c*(rsg/100);
            let rat=o.mfe>=tpR?tpR:-1;
            if(fees)rat-=comisionR(o.riesgoP);
            c+=a*rat;
          }
          return Math.round(c);
        });
        if(window._chTp)window._chTp.destroy();
        window._chTp=new Chart(ctxTp,{type:"line",
          data:{labels:ratios.map(r=>r.toFixed(1)),
            datasets:[
              {data:caps,borderColor:"#10b981",backgroundColor:"rgba(16,185,129,.08)",fill:true,tension:.3,pointRadius:ratios.map(r=>r===1.0?6:0),pointBackgroundColor:"#f59e0b",borderWidth:2},
              {data:ratios.map(()=>cap),borderColor:"rgba(255,255,255,.15)",borderWidth:1,borderDash:[4,4],pointRadius:0}
            ]},
          options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
            scales:{x:{title:{display:true,text:"Ratio TP",color:"#64748b",font:{size:10}},ticks:{color:"#64748b",font:{size:9},maxTicksLimit:12},grid:{color:"#1e293b"}},
              y:{title:{display:true,text:"$",color:"#64748b",font:{size:10}},ticks:{color:"#64748b",font:{size:9}},grid:{color:"#1e293b"}}}}
        });
      }
    }

    // GRÁFICA BE VARIABLE
    if(tab==="cuenta"&&rawOps.length>5&&est!=="TP_FIJO"){
      const ctxBe=document.getElementById("beCh")?.getContext("2d");
      if(ctxBe){
        const beRatios=[];for(let r=5;r<=30;r++)beRatios.push(r/10);
        const caps=beRatios.map(br=>{
          // Re-simulate all ops with this BE ratio
          const reOps=S.senales.map(s=>({...s,...simOp(s,datos.velas,br)}));
          const sim2=simCuenta(reOps,cap,rsg,est,tp05,fees,S.maxSim);
          return Math.round(sim2.cFinal);
        });
        // Also add "sin BE" for optional strategies
        let capsNoBE=null;
        if(EST_NEEDS_BE[est]==="optional"){
          const reOps0=S.senales.map(s=>({...s,...simOp(s,datos.velas,0)}));
          const sim0=simCuenta(reOps0,cap,rsg,est,tp05,fees,S.maxSim);
          capsNoBE=Math.round(sim0.cFinal);
        }
        if(window._chBe)window._chBe.destroy();
        const datasets=[{data:caps,borderColor:"#8b5cf6",backgroundColor:"rgba(139,92,246,.08)",fill:true,tension:.3,pointRadius:beRatios.map(r=>r===beRatio?6:0),pointBackgroundColor:"#f59e0b",borderWidth:2},
          {data:beRatios.map(()=>cap),borderColor:"rgba(255,255,255,.15)",borderWidth:1,borderDash:[4,4],pointRadius:0}];
        if(capsNoBE!==null){
          datasets.push({data:beRatios.map(()=>capsNoBE),borderColor:"rgba(239,68,68,.5)",borderWidth:1,borderDash:[6,3],pointRadius:0,label:"Sin BE"});
        }
        window._chBe=new Chart(ctxBe,{type:"line",
          data:{labels:beRatios.map(r=>r.toFixed(1)),datasets},
          options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:capsNoBE!==null,labels:{color:"#64748b",font:{size:9}}}},
            scales:{x:{title:{display:true,text:"Ratio activacion BE",color:"#64748b",font:{size:10}},ticks:{color:"#64748b",font:{size:9}},grid:{color:"#1e293b"}},
              y:{title:{display:true,text:"$",color:"#64748b",font:{size:10}},ticks:{color:"#64748b",font:{size:9}},grid:{color:"#1e293b"}}}}
        });
      }
    }

    // GRAFICO: velas japonesas
    if(tab==="grafico"&&nv>20){
      const last=datos.velas.slice(-150);
      drawCandles("pCh",last,null);
    }

    // OP DETAIL: velas con TODOS los puntos de salida
    if(tab==="detalle"&&selOp!==null&&rawOps[selOp]){
      const op=rawOps[selOp];
      const ALL_E=ESTS;
      const EST_COLORS={"TP_FIJO":"#3b82f6","BE_Y_CORRER":"#8b5cf6","RATIO_LINEAL":"#f59e0b","RATIO_NO_LINEAL":"#ec4899","CRUCE_EMA12":"#06b6d4","PIVOTE_CONFIRMADO":"#84cc16","MIXTA":"#f97316"};
      let maxVi=op.idx+30;
      for(const e of ALL_E){const s=op.estrategias?.[e];if(s?.vi)maxVi=Math.max(maxVi,s.vi)}
      if(op.tp050?.vi)maxVi=Math.max(maxVi,op.tp050.vi);
      const eIdx=op.idx;
      const from=Math.max(0,eIdx-10),to=Math.min(datos.velas.length-1,maxVi+20);
      const sl=datos.velas.slice(from,to+1);
      const eL=eIdx-from;
      const vLines=[{idx:eL,color:"#ffffff",dash:[],label:"ENTRA"}];
      const hLines=[
        {y:op.sl,color:"rgba(239,68,68,.6)",dash:[6,3],label:"SL "+f(op.sl,pd)},
        {y:op.tp11,color:"rgba(16,185,129,.6)",dash:[6,3],label:"TP1 "+f(op.tp11,pd)},
        {y:op.precioIn,color:"rgba(255,255,255,.2)",dash:[2,4],label:""},
      ];
      if(op.tp050&&op.tp050.vi){
        const sL=Math.min(op.tp050.vi-from,sl.length-1);
        vLines.push({idx:sL,color:"#f59e0b",dash:[3,3],label:"TP.5 "+f(op.tp050.ratio,1)+"R"});
      }
      for(const e of ALL_E){
        const s=op.estrategias?.[e];if(!s||!s.vi)continue;
        const sL=Math.min(s.vi-from,sl.length-1);
        const col=EST_COLORS[e]||"#fff";
        const shortName=e.replace("RATIO_","R_").replace("CRUCE_","").replace("PIVOTE_","P_").replace("_Y_CORRER","").replace("_CONFIRMADO","").slice(0,6);
        const existsAt=vLines.filter(v=>v.idx===sL).length;
        vLines.push({idx:sL,color:col,dash:[4,2],label:shortName+" "+f(s.ratio,1)+"R",labelOffset:existsAt*12});
      }
      drawCandles("opCh",sl,{hLines,vLines,
        zone:{from:eL,to:Math.min((op.estrategias?.TP_FIJO?.vi||eL+20)-from,sl.length-1),
          color:op.estrategias?.TP_FIJO?.ratio>=0?"rgba(16,185,129,.04)":"rgba(239,68,68,.04)"}});
    }
  },80);
}

try{
  if(!CONFIG_OK){
    // Mostrar banner de configuración
    render();
  } else {
    // Cargar datos inmediatamente al abrir
    exec();
    setupA();
  }
}catch(e){document.getElementById("app").innerHTML='<div style="padding:20px;color:#ef4444;font-family:monospace;background:#0a0e17;min-height:100vh"><h2 style="color:#f59e0b">Error</h2><pre style="white-space:pre-wrap;margin-top:10px;color:#e2e8f0">'+e.message+'\n\n'+e.stack+'</pre></div>'}
</script>
</body>
</html>
<!--
════════════════════════════════════════════════════════════════════
  INSTRUCCIONES: CONFIGURAR GUARDAR EN GOOGLE SHEETS
════════════════════════════════════════════════════════════════════

PASO 1 — Crear el Apps Script
  1. Abre tu Google Sheet "PUPUPU_Velas"
  2. Menú: Extensiones → Apps Script
  3. Borra todo el contenido y pega el código del archivo "pupupu_appscript.gs"
  4. Guarda (Ctrl+S) con nombre: "PUPUPU Save Ops"

PASO 2 — Publicar como Web App
  1. Clic en "Implementar" → "Nueva implementación"
  2. Tipo: "Aplicación web"
  3. Ejecutar como: "Yo (tu email)"
  4. Quién tiene acceso: "Cualquier usuario"
  5. Clic "Implementar" → Autoriza los permisos
  6. COPIA la URL que aparece (termina en /exec)

PASO 3 — Pegar la URL en este HTML
  1. Abre este archivo con un editor de texto
  2. Busca: TU_APPS_SCRIPT_URL_AQUI
  3. Reemplázala por la URL copiada

PASO 4 — Columnas de PUPUPU_Ops (se crean automáticamente)
  guardado_en | par | ts_entrada | ts_cruce | direccion | precio_entrada |
  sl | tp_1_1 | riesgo_pct | dist_pivote_ema_pct | mfe_ratio_max | mae |
  cumple_vwap | es_vela_intencion | retesteo_velas | estrategia |
  ratio | motivo | ts_salida | precio_salida | capital | riesgo_sim |
  fees | max_sim

════════════════════════════════════════════════════════════════════
-->
